databases:
  - name: payment-system-db
    plan: free
    databaseName: payment_db
    user: payment_user

services:
  - type: web
    name: payment-system-api
    plan: free
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn payment_system.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: payment-system-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.0"
